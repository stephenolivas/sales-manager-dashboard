name: Update Rep Metrics Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Close API
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python3 scripts/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json archives/
          git diff --staged --quiet || git commit -m "📊 Update dashboard data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin main || true
          git push
