<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rep Metrics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --text: #1a1d23;
            --text-secondary: #5f6577;
            --text-muted: #9ca0ad;
            --border: #e5e7ec;
            --accent: #2563eb;
            --accent-light: #eff4ff;
            --green: #16a34a;
            --amber: #d97706;
            --red: #dc2626;
            --teal: #0d9488;
            --teal-bg: #f0fdfa;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .header-icon {
            width: 38px; height: 38px;
            background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        .header-icon svg { width: 20px; height: 20px; fill: white; }

        .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
        .header h1 span { color: var(--text-secondary); font-weight: 500; }

        .header-right { display: flex; align-items: center; gap: 20px; color: var(--text-secondary); font-size: 13px; }

        .live-dot {
            width: 8px; height: 8px; background: var(--green); border-radius: 50%;
            display: inline-block; margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .month-badge {
            background: var(--accent-light); color: var(--accent);
            padding: 5px 14px; border-radius: 20px; font-weight: 700; font-size: 13px;
        }

        .content { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

        .table-section {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .table-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; border-bottom: 1px solid var(--border);
        }

        .table-title { font-size: 15px; font-weight: 700; }
        .table-title span { color: var(--text-muted); font-weight: 400; }

        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }

        col.col-name { width: 180px; }
        col.col-num  { width: 100px; }
        col.col-rate { width: 120px; }

        /* ── Group header row (Meeting Funnel / Performance Rates) ── */

        thead tr.group-header th {
            background: var(--surface);
            padding: 8px 16px;
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            border-bottom: 2px solid var(--border);
            text-align: center;
        }

        thead tr.group-header th.group-meetings {
            background: var(--accent-light); color: var(--accent);
            border-left: 2px solid var(--border);
            border-right: 2px solid var(--border);
        }

        thead tr.group-header th.group-rates {
            background: var(--teal-bg); color: var(--teal);
        }

        /* ── Sort header row ── */

        thead tr.sort-header th {
            position: sticky; top: 0;
            background: var(--bg);
            padding: 10px 16px;
            text-align: right;
            font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--text-secondary);
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
            transition: color 0.15s;
        }

        thead tr.sort-header th:hover { color: var(--accent); }
        thead tr.sort-header th.active { color: var(--accent); }
        thead tr.sort-header th.active::after { content: ' ▼'; font-size: 8px; }
        thead tr.sort-header th.active.asc::after { content: ' ▲'; font-size: 8px; }
        thead tr.sort-header th:first-child { text-align: left; padding-left: 24px; }

        /* Vertical border lines through ALL rows */
        thead tr.sort-header th.col-meetings-start,
        tbody td.col-meetings-start { border-left: 2px solid var(--border); }

        thead tr.sort-header th.col-meetings-end,
        tbody td.col-meetings-end { border-right: 2px solid var(--border); }

        thead tr.sort-header th.col-rates-end,
        tbody td.col-rates-end { }

        /* ── Body ── */

        tbody tr { transition: background 0.1s; }
        tbody tr:hover { background: #f8f9fb; }
        tbody tr:not(:last-child) td { border-bottom: 1px solid #f0f1f3; }

        tbody td {
            padding: 12px 16px; text-align: right;
            font-variant-numeric: tabular-nums;
        }

        tbody td:first-child { text-align: left; padding-left: 24px; font-weight: 600; }

        .manager-tag {
            font-size: 10px; background: #f0f1f3; color: var(--text-muted);
            padding: 2px 7px; border-radius: 4px; margin-left: 6px; font-weight: 500;
        }

        tbody tr.totals-row {
            background: var(--bg); font-weight: 700;
            border-top: 2px solid var(--border);
        }

        tbody tr.totals-row td { padding: 14px 16px; border-bottom: none; }
        tbody tr.totals-row td:first-child { padding-left: 24px; }

        .rate-high { color: var(--green); }
        .rate-mid  { color: var(--teal); }
        .rate-low  { color: var(--amber); }
        .rate-bad  { color: var(--red); }
        .rate-na   { color: var(--text-muted); }

        .footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }

        .loading {
            display: flex; align-items: center; justify-content: center;
            padding: 80px 20px; color: var(--text-muted); font-size: 14px; gap: 10px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .content { padding: 16px 20px; }
            col.col-name { width: 140px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-icon">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <h1>Rep Metrics <span>Dashboard</span></h1>
    </div>
    <div class="header-right">
        <span class="month-badge" id="monthLabel">—</span>
        <span><span class="live-dot"></span>Updated <span id="updatedAt">—</span></span>
    </div>
</div>

<div class="content">
    <div class="table-section">
        <div class="table-header">
            <div class="table-title">Rep Breakdown <span id="repCount"></span></div>
            <div style="font-size: 12px; color: var(--text-muted);">Click any column header to sort</div>
        </div>
        <div class="table-wrap">
            <table>
                <colgroup>
                    <col class="col-name">
                    <col class="col-num">
                    <col class="col-num">
                    <col class="col-num">
                    <col class="col-num">
                    <col class="col-num">
                    <col class="col-rate">
                    <col class="col-rate">
                    <col class="col-rate">
                    <col class="col-rate">
                </colgroup>
                <thead>
                    <tr class="group-header">
                        <th class="group-empty"></th>
                        <th class="group-meetings" colspan="5">Meeting Funnel</th>
                        <th class="group-rates" colspan="4">Performance Rates</th>
                    </tr>
                    <tr class="sort-header" id="tableHead">
                        <th data-key="name" data-dir="asc" data-type="string">Rep Name</th>
                        <th data-key="booked" data-dir="desc" data-type="num" class="active col-meetings-start">Booked</th>
                        <th data-key="shown" data-dir="desc" data-type="num">Shown</th>
                        <th data-key="no_show" data-dir="desc" data-type="num">No-Show</th>
                        <th data-key="no_entry" data-dir="desc" data-type="num">No Entry</th>
                        <th data-key="qualified" data-dir="desc" data-type="num" class="col-meetings-end">Qualified</th>
                        <th data-key="show_rate" data-dir="desc" data-type="num">Show %</th>
                        <th data-key="close_rate" data-dir="desc" data-type="num">Booked→Close</th>
                        <th data-key="shown_to_close_rate" data-dir="desc" data-type="num">Shown→Close</th>
                        <th data-key="qualified_to_close_rate" data-dir="desc" data-type="num">Qual→Close</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" class="loading"><div class="spinner"></div> Loading data…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="footer">
    Auto-refreshes every 5 minutes &nbsp;·&nbsp; Data from Close CRM
</div>

<script>
(function () {
    'use strict';

    let DATA = null;
    let currentSort = { key: 'booked', dir: 'desc' };

    async function fetchData() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            DATA = await resp.json();
            render();
        } catch (e) {
            console.error('Failed to fetch data.json:', e);
        }
    }

    function render() {
        if (!DATA) return;
        document.getElementById('monthLabel').textContent = DATA.month_label || '—';
        document.getElementById('updatedAt').textContent = DATA.updated_at || '—';
        renderTable();
    }

    function fmtPct(v) {
        if (v === null || v === undefined) return '—';
        return v + '%';
    }

    function rateClass(v) {
        if (v === null || v === undefined) return 'rate-na';
        if (v >= 65) return 'rate-high';
        if (v >= 45) return 'rate-mid';
        if (v >= 25) return 'rate-low';
        return 'rate-bad';
    }

    function renderTable() {
        const reps = [...DATA.reps];
        const { key, dir } = currentSort;

        reps.sort((a, b) => {
            let va = a[key], vb = b[key];
            if (va === null || va === undefined) va = -Infinity;
            if (vb === null || vb === undefined) vb = -Infinity;
            if (typeof va === 'string') {
                return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            }
            return dir === 'asc' ? va - vb : vb - va;
        });

        document.getElementById('repCount').textContent = `· ${reps.length} reps`;

        const tbody = document.getElementById('tableBody');
        let html = '';

        for (const r of reps) {
            const mgr = r.is_manager ? '<span class="manager-tag">MGR</span>' : '';
            html += `<tr>
                <td>${r.name}${mgr}</td>
                <td class="col-meetings-start">${r.booked}</td>
                <td>${r.shown}</td>
                <td>${r.no_show}</td>
                <td>${r.no_entry}</td>
                <td class="col-meetings-end">${r.qualified}</td>
                <td class="${rateClass(r.show_rate)}">${fmtPct(r.show_rate)}</td>
                <td class="${rateClass(r.close_rate)}">${fmtPct(r.close_rate)}</td>
                <td class="${rateClass(r.shown_to_close_rate)}">${fmtPct(r.shown_to_close_rate)}</td>
                <td class="${rateClass(r.qualified_to_close_rate)}">${fmtPct(r.qualified_to_close_rate)}</td>
            </tr>`;
        }

        html += `<tr class="totals-row">
            <td>Totals</td>
            <td class="col-meetings-start">${DATA.total_booked}</td>
            <td>${DATA.total_shown}</td>
            <td>${DATA.total_no_show}</td>
            <td>${DATA.total_no_entry}</td>
            <td class="col-meetings-end">${DATA.total_qualified}</td>
            <td class="${rateClass(DATA.team_show_rate)}">${fmtPct(DATA.team_show_rate)}</td>
            <td class="${rateClass(DATA.team_close_rate)}">${fmtPct(DATA.team_close_rate)}</td>
            <td class="${rateClass(DATA.team_shown_to_close_rate)}">${fmtPct(DATA.team_shown_to_close_rate)}</td>
            <td class="${rateClass(DATA.team_qualified_to_close_rate)}">${fmtPct(DATA.team_qualified_to_close_rate)}</td>
        </tr>`;

        tbody.innerHTML = html;
    }

    document.getElementById('tableHead').addEventListener('click', (e) => {
        const th = e.target.closest('th');
        if (!th || !th.dataset.key) return;

        const key = th.dataset.key;
        const defaultDir = th.dataset.dir || 'desc';

        if (currentSort.key === key) {
            currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
        } else {
            currentSort = { key, dir: defaultDir };
        }

        document.querySelectorAll('#tableHead th').forEach(h => h.classList.remove('active', 'asc'));
        th.classList.add('active');
        if (currentSort.dir === 'asc') th.classList.add('asc');

        renderTable();
    });

    fetchData();
    setInterval(fetchData, 5 * 60 * 1000);
})();
</script>
</body>
</html>
