<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Rep Metrics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --text: #1a1d23;
            --text-secondary: #5f6577;
            --text-muted: #9ca0ad;
            --border: #e5e7ec;
            --accent: #2563eb;
            --accent-light: #eff4ff;
            --green: #16a34a;
            --amber: #d97706;
            --red: #dc2626;
            --teal: #0d9488;
            --teal-bg: #f0fdfa;
            --purple: #7c3aed;
            --purple-bg: #f5f3ff;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .header-icon {
            width: 38px; height: 38px;
            background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        .header-icon svg { width: 20px; height: 20px; fill: white; }

        .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
        .header h1 span { color: var(--text-secondary); font-weight: 500; }

        .header-right { display: flex; align-items: center; gap: 20px; color: var(--text-secondary); font-size: 13px; }

        .live-dot {
            width: 8px; height: 8px; background: var(--green); border-radius: 50%;
            display: inline-block; margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .week-badge {
            background: var(--accent-light); color: var(--accent);
            padding: 5px 14px; border-radius: 20px; font-weight: 700; font-size: 13px;
        }

        .day-indicator {
            display: flex; gap: 4px; align-items: center;
        }

        .day-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--border);
        }

        .day-dot.active { background: var(--accent); }
        .day-dot.today { background: var(--green); box-shadow: 0 0 0 2px rgba(22,163,74,0.25); }

        .day-label {
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px;
        }

        .content { max-width: 1560px; margin: 0 auto; padding: 24px 32px; }

        .table-section {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .table-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; border-bottom: 1px solid var(--border);
        }

        .table-title { font-size: 15px; font-weight: 700; }
        .table-title span { color: var(--text-muted); font-weight: 400; }

        .table-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }

        col.col-name  { width: 170px; }
        col.col-prog  { width: 95px; }
        col.col-money { width: 115px; }
        col.col-rate  { width: 105px; }

        thead tr.group-header th {
            background: var(--surface);
            padding: 8px 16px;
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            border-bottom: 2px solid var(--border);
            text-align: center;
        }

        thead tr.group-header th.group-activity {
            background: var(--accent-light); color: var(--accent);
            border-left: 2px solid var(--border);
            border-right: 2px solid var(--border);
        }

        thead tr.group-header th.group-performance {
            background: var(--teal-bg); color: var(--teal);
            border-right: 2px solid var(--border);
        }

        thead tr.group-header th.group-quality {
            background: var(--purple-bg); color: var(--purple);
        }

        thead tr.sort-header th {
            position: sticky; top: 0;
            background: var(--bg);
            padding: 10px 10px;
            text-align: right;
            font-weight: 600; font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--text-secondary);
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
            transition: color 0.15s;
        }

        thead tr.sort-header th:hover { color: var(--accent); }
        thead tr.sort-header th.active { color: var(--accent); }
        thead tr.sort-header th.active::after { content: ' ▼'; font-size: 8px; }
        thead tr.sort-header th.active.asc::after { content: ' ▲'; font-size: 8px; }
        thead tr.sort-header th:first-child { text-align: left; padding-left: 24px; }

        thead tr.sort-header th.g-activity-start, tbody td.g-activity-start { border-left: 2px solid var(--border); }
        thead tr.sort-header th.g-activity-end, tbody td.g-activity-end { border-right: 2px solid var(--border); }
        thead tr.sort-header th.g-perf-end, tbody td.g-perf-end { border-right: 2px solid var(--border); }

        tbody tr { transition: background 0.1s; }
        tbody tr:hover { background: #f8f9fb; }
        tbody tr:not(:last-child) td { border-bottom: 1px solid #f0f1f3; }

        tbody td {
            padding: 11px 10px; text-align: right;
            font-variant-numeric: tabular-nums;
        }

        tbody td:first-child { text-align: left; padding-left: 24px; font-weight: 600; }

        .manager-tag {
            font-size: 10px; background: #f0f1f3; color: var(--text-muted);
            padding: 2px 7px; border-radius: 4px; margin-left: 6px; font-weight: 500;
        }

        .tbd-tag {
            font-size: 10px; background: #f5f3ff; color: var(--purple);
            padding: 2px 7px; border-radius: 4px; font-weight: 600;
        }

        .prog {
            display: inline-flex; align-items: baseline; gap: 1px; font-weight: 600;
        }
        .prog .val { font-size: 14px; }
        .prog .sep { color: var(--text-muted); font-size: 11px; margin: 0 2px; font-weight: 400; }
        .prog .target { color: var(--text-muted); font-size: 11px; font-weight: 400; }
        .prog.hit .val { color: var(--green); }
        .prog.miss .val { color: var(--text); }
        .prog.zero .val { color: var(--text-muted); }

        tbody tr.totals-row {
            background: var(--bg); font-weight: 700;
            border-top: 2px solid var(--border);
        }
        tbody tr.totals-row td { padding: 14px 10px; border-bottom: none; }
        tbody tr.totals-row td:first-child { padding-left: 24px; }

        .rate-high { color: var(--green); }
        .rate-mid  { color: var(--teal); }
        .rate-low  { color: var(--amber); }
        .rate-bad  { color: var(--red); }
        .rate-na   { color: var(--text-muted); }

        .footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }

        .loading {
            display: flex; align-items: center; justify-content: center;
            padding: 80px 20px; color: var(--text-muted); font-size: 14px; gap: 10px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
            .content { padding: 16px 20px; }
            col.col-name { width: 140px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-icon">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <h1>Weekly Rep Metrics <span>Dashboard</span></h1>
    </div>
    <div class="header-right">
        <span class="week-badge" id="weekLabel">—</span>
        <div class="day-indicator" id="dayIndicator"></div>
        <span><span class="live-dot"></span>Updated <span id="updatedAt">—</span></span>
    </div>
</div>

<div class="content">
    <div class="table-section">
        <div class="table-header">
            <div class="table-title">Rep Breakdown — WTD <span id="repCount"></span></div>
            <div style="font-size: 12px; color: var(--text-muted);">Click any column header to sort</div>
        </div>
        <div class="table-wrap">
            <table>
                <colgroup>
                    <col class="col-name">
                    <col class="col-prog">
                    <col class="col-prog">
                    <col class="col-prog">
                    <col class="col-prog">
                    <col class="col-money">
                    <col class="col-rate">
                    <col class="col-rate">
                    <col class="col-money">
                    <col class="col-rate">
                    <col class="col-rate">
                </colgroup>
                <thead>
                    <tr class="group-header">
                        <th></th>
                        <th class="group-activity" colspan="5">Week-to-Date Activity</th>
                        <th class="group-performance" colspan="3">Performance</th>
                        <th class="group-quality" colspan="2">Quality</th>
                    </tr>
                    <tr class="sort-header" id="tableHead">
                        <th data-key="name" data-dir="asc" data-type="string">Rep Name</th>
                        <th data-key="booked" data-dir="desc" data-type="num" class="active g-activity-start">Booked</th>
                        <th data-key="shown" data-dir="desc" data-type="num">Shown</th>
                        <th data-key="qualified" data-dir="desc" data-type="num">Qualified</th>
                        <th data-key="deals" data-dir="desc" data-type="num">Closed Won</th>
                        <th data-key="revenue" data-dir="desc" data-type="num" class="g-activity-end">Revenue</th>
                        <th data-key="close_rate" data-dir="desc" data-type="num">Close %</th>
                        <th data-key="qa_score" data-dir="desc" data-type="num">QA Score</th>
                        <th data-key="avg_rev_per_deal" data-dir="desc" data-type="num" class="g-perf-end">Avg/Deal</th>
                        <th data-key="crm_compliance" data-dir="desc" data-type="num">CRM Compl.</th>
                        <th data-key="task_adherence" data-dir="desc" data-type="num">Task Adh.</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" class="loading"><div class="spinner"></div> Loading data…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="footer">
    Data from Close CRM &nbsp;·&nbsp; <a href="archive.html">📅 View Archive →</a>
</div>

<script>
(function () {
    'use strict';

    let DATA = null;
    let currentSort = { key: 'booked', dir: 'desc' };

    async function fetchData() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            DATA = await resp.json();
            render();
        } catch (e) {
            console.error('Failed to fetch data.json:', e);
        }
    }

    function render() {
        if (!DATA) return;
        document.getElementById('weekLabel').textContent = DATA.week_label || '—';
        document.getElementById('updatedAt').textContent = DATA.updated_at || '—';

        // Day-of-week indicator (M T W T F)
        const dayOfWeek = DATA.day_of_week || 1;
        const days = ['M', 'T', 'W', 'T', 'F'];
        let dayHtml = '<span class="day-label">Day ' + dayOfWeek + '/5</span>';
        for (let i = 0; i < 5; i++) {
            const cls = i < dayOfWeek - 1 ? 'active' : (i === dayOfWeek - 1 ? 'today' : '');
            dayHtml += `<div class="day-dot ${cls}" title="${days[i]}"></div>`;
        }
        document.getElementById('dayIndicator').innerHTML = dayHtml;

        renderTable();
    }

    const T = () => DATA.targets || {};

    function prog(val, target) {
        if (val === null || val === undefined) return '<span class="prog zero"><span class="val">—</span></span>';
        const state = val >= target ? 'hit' : (val === 0 ? 'zero' : 'miss');
        return `<span class="prog ${state}"><span class="val">${val}</span><span class="sep">/</span><span class="target">${target}</span></span>`;
    }

    function progMoney(val, target) {
        if (val === null || val === undefined || val === 0) {
            return `<span class="prog zero"><span class="val">$0</span><span class="sep">/</span><span class="target">${fmtK(target)}</span></span>`;
        }
        const state = val >= target ? 'hit' : 'miss';
        return `<span class="prog ${state}"><span class="val">${fmtK(val)}</span><span class="sep">/</span><span class="target">${fmtK(target)}</span></span>`;
    }

    function progPct(val, target) {
        if (val === null || val === undefined) return '<span class="prog zero"><span class="val">—</span><span class="sep">/</span><span class="target">' + target + '%</span></span>';
        const state = val >= target ? 'hit' : 'miss';
        return `<span class="prog ${state}"><span class="val">${val}%</span><span class="sep">/</span><span class="target">${target}%</span></span>`;
    }

    function fmtK(v) {
        if (v === null || v === undefined) return '—';
        if (v >= 1000) {
            const k = v / 1000;
            return '$' + (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1)) + 'k';
        }
        return '$' + Math.round(v).toLocaleString();
    }

    function fmtAdherence(adherence, overdue) {
        if (adherence === null || adherence === undefined) return '—';
        const cls = adherence >= 90 ? 'rate-high' : adherence >= 70 ? 'rate-mid' : adherence >= 50 ? 'rate-low' : 'rate-bad';
        const extra = overdue > 0 ? ` <span style="font-size:10px;color:var(--red);">(${overdue})</span>` : '';
        return `<span class="${cls}">${adherence}%</span>${extra}`;
    }

    function renderTable() {
        const reps = [...DATA.reps];
        const { key, dir } = currentSort;
        const t = T();
        const tt = DATA.team_targets || {};

        reps.sort((a, b) => {
            let va = a[key], vb = b[key];
            if (va === null || va === undefined) va = -Infinity;
            if (vb === null || vb === undefined) vb = -Infinity;
            if (typeof va === 'string') {
                return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            }
            return dir === 'asc' ? va - vb : vb - va;
        });

        document.getElementById('repCount').textContent = `· ${reps.length} reps`;

        const TBD = '<span class="tbd-tag">TBD</span>';
        let html = '';

        for (const r of reps) {
            const mgr = r.is_manager;
            const mgrTag = mgr ? '<span class="manager-tag">MGR</span>' : '';

            if (mgr) {
                html += `<tr>
                    <td>${r.name}${mgrTag}</td>
                    <td class="g-activity-start" style="color:var(--text-muted)">${r.booked}</td>
                    <td style="color:var(--text-muted)">${r.shown}</td>
                    <td style="color:var(--text-muted)">${r.qualified}</td>
                    <td>${r.deals}</td>
                    <td class="g-activity-end">${r.revenue ? fmtK(r.revenue) : '—'}</td>
                    <td style="color:var(--text-muted)">—</td>
                    <td>${TBD}</td>
                    <td class="g-perf-end">${r.avg_rev_per_deal ? fmtK(r.avg_rev_per_deal) : '—'}</td>
                    <td style="color:var(--text-muted)">—</td>
                    <td style="color:var(--text-muted)">—</td>
                </tr>`;
            } else {
                html += `<tr>
                    <td>${r.name}${mgrTag}</td>
                    <td class="g-activity-start">${prog(r.booked, t.booked)}</td>
                    <td>${prog(r.shown, t.shown)}</td>
                    <td>${prog(r.qualified, t.qualified)}</td>
                    <td>${prog(r.deals, t.deals)}</td>
                    <td class="g-activity-end">${progMoney(r.revenue, t.revenue)}</td>
                    <td>${progPct(r.close_rate, t.close_rate)}</td>
                    <td>${TBD}</td>
                    <td class="g-perf-end">${progMoney(r.avg_rev_per_deal, t.avg_rev_per_deal)}</td>
                    <td>${progPct(r.crm_compliance, t.crm_compliance)}</td>
                    <td>${fmtAdherence(r.task_adherence, r.tasks_overdue)}</td>
                </tr>`;
            }
        }

        // Totals row with team targets
        html += `<tr class="totals-row">
            <td>Team Totals</td>
            <td class="g-activity-start">${prog(DATA.total_booked, tt.booked)}</td>
            <td>${prog(DATA.total_shown, tt.shown)}</td>
            <td>${prog(DATA.total_qualified, tt.qualified)}</td>
            <td>${prog(DATA.total_deals, tt.deals)}</td>
            <td class="g-activity-end">${progMoney(DATA.total_revenue, tt.revenue)}</td>
            <td>${progPct(DATA.team_close_rate, tt.close_rate)}</td>
            <td>${TBD}</td>
            <td class="g-perf-end">${DATA.team_avg_rev_per_deal ? fmtK(DATA.team_avg_rev_per_deal) : '—'}</td>
            <td>${progPct(DATA.team_crm_compliance, tt.crm_compliance)}</td>
            <td>${fmtAdherence(DATA.team_task_adherence, DATA.team_overdue)}</td>
        </tr>`;

        document.getElementById('tableBody').innerHTML = html;
    }

    document.getElementById('tableHead').addEventListener('click', (e) => {
        const th = e.target.closest('th');
        if (!th || !th.dataset.key) return;
        const key = th.dataset.key;
        const defaultDir = th.dataset.dir || 'desc';
        if (currentSort.key === key) {
            currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
        } else {
            currentSort = { key, dir: defaultDir };
        }
        document.querySelectorAll('#tableHead th').forEach(h => h.classList.remove('active', 'asc'));
        th.classList.add('active');
        if (currentSort.dir === 'asc') th.classList.add('asc');
        renderTable();
    });

    fetchData();
    setInterval(fetchData, 5 * 60 * 1000);
})();
</script>
</body>
</html>
